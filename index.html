<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="logo_head.png">
  <title>Lunete</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #1b2a4a, #020617 70%);
      display: flex;
      height: 100vh;
      color: #e6f0ff;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      padding: 15px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .logo span {
      color: #4da6ff;
      font-size: 22px;
    }

    .new-chat {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 15px;
      transition: 0.2s;
    }

    .new-chat:hover {
      transform: scale(1.03);
      box-shadow: 0 0 10px rgba(59,130,246,0.4);
    }

    .chat-item {
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 5px;
      color: #9db4ff;
    }

    .chat-item:hover {
      background: rgba(59,130,246,0.15);
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 16px;
      color: #c7d2fe;
    }

    /* CHAT */
    .messages {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
    }

    .msg {
      margin-bottom: 15px;
      display: flex;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      max-width: 60%;
      font-size: 14px;
      backdrop-filter: blur(6px);
    }

    .user .bubble {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 0 10px rgba(59,130,246,0.3);
    }

    .ai .bubble {
      background: rgba(255,255,255,0.05);
      color: #dbeafe;
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* INPUT */
    .input-area {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.05);
      color: white;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(59,130,246,0.5);
    }

    .logo img {
      height: 200px;
      object-fit: contain;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .chat-item.active {
      background: rgba(59,130,246,0.25);
      color: white;
      box-shadow: 0 0 8px rgba(59,130,246,0.4);
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <div class="logo">
      <img src="logo.png" alt="Lunete Logo">
    </div>

    <div class="new-chat" onclick="criarChat()">+ Novo Chat</div>

    <div id="chat-list"></div>
  </div>

  <div class="main">

    <div class="header" id="chat-header">
      Chat
    </div>

    <div id="chat" class="messages">
      <div class="msg ai">
        <div class="bubble">Olá, estou aqui para conversar com você.</div>
      </div>

      <div class="msg user">
        <div class="bubble">Agora ficou bonito de verdade</div>
      </div>
    </div>

    <div class="input-area">
      <input id="input" placeholder="Digite sua mensagem..." />
      <button onclick="enviar()">Enviar</button>
    </div>

  </div>

<script type="module">
import { CreateMLCEngine, prebuiltAppConfig } from "https://esm.run/@mlc-ai/web-llm";

const chatBox = document.getElementById("chat");
const header = document.getElementById("chat-header");

// ========================
// 🧠 USER ID
// ========================

let userId = localStorage.getItem("lunete_user");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("lunete_user", userId);
}

// ========================
// 💾 STORAGE
// ========================

function salvarChats() {
  localStorage.setItem("lunete_chats", JSON.stringify(chats));
}

// ========================
// 🧠 SISTEMA DE CHATS
// ========================

let chats = JSON.parse(localStorage.getItem("lunete_chats")) || {};
let chatAtual = null;
let contador = Object.keys(chats).length + 1;

// ========================
// 🧠 CRIAR CHAT
// ========================

window.criarChat = function () {
  const id = "Chat " + contador++;

  chats[id] = [
    {
      role: "system",
      content: "Você é a Lunete, uma IA amigável, direta e empática."
    }
  ];

  chatAtual = id;

  salvarChats();
  atualizarLista();
  atualizarTitulo();
  renderizarChat();
};

// ========================
// 🔁 TROCAR CHAT
// ========================

function trocarChat(id) {
  chatAtual = id;
  atualizarTitulo();
  atualizarLista();
  renderizarChat();
}

// ========================
// 🏷️ TÍTULO
// ========================

function atualizarTitulo() {
  header.innerText = chatAtual;
}

// ========================
// 📋 LISTA
// ========================

function atualizarLista() {
  const lista = document.getElementById("chat-list");
  lista.innerHTML = "";

  Object.keys(chats).forEach(id => {
    const div = document.createElement("div");

    div.className = "chat-item" + (id === chatAtual ? " active" : "");
    div.innerText = id;

    div.onclick = () => trocarChat(id);

    lista.appendChild(div);
  });
}

// ========================
// 💬 RENDER
// ========================

function renderizarChat() {
  chatBox.innerHTML = "";

  const mensagens = chats[chatAtual];

  mensagens.forEach(msg => {
    if (msg.role === "user") addMessage(msg.content, "user");
    if (msg.role === "assistant") addMessage(msg.content, "ai");
  });
}

// ========================
// 💬 ADD MSG
// ========================

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  div.appendChild(bubble);
  chatBox.appendChild(div);

  chatBox.scrollTop = chatBox.scrollHeight;
}

// ========================
// 🤖 IA
// ========================

const MODEL = prebuiltAppConfig.model_list[0].model_id;
let engine = await CreateMLCEngine(MODEL);

// ========================
// 🚀 ENVIAR
// ========================

window.enviar = async function () {
  const input = document.getElementById("input");
  const msg = input.value;

  if (!msg.trim() || !engine || !chatAtual) return;

  addMessage(msg, "user");

  chats[chatAtual].push({ role: "user", content: msg });
  salvarChats();

  try {
    const resposta = await engine.chat.completions.create({
      messages: chats[chatAtual]
    });

    const texto = resposta.choices[0].message.content;

    chats[chatAtual].push({ role: "assistant", content: texto });
    salvarChats();

    addMessage(texto, "ai");

  } catch (erro) {
    console.log("Erro IA:", erro);
  }

  input.value = "";
};

// ========================
// ⌨️ ENTER
// ========================

const input = document.getElementById("input");

input.addEventListener("keydown", function (event) {
  if (event.key === "Enter" && !event.shiftKey) {
    event.preventDefault();
    enviar();
  }
});

// ========================
// 🟢 INICIAR
// ========================

if (Object.keys(chats).length > 0) {
  chatAtual = Object.keys(chats)[0];
  atualizarLista();
  atualizarTitulo();
  renderizarChat();
} else {
  criarChat();
}
</script>

</body>
</html>
